<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator UI</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
}

.container {
    max-width: 400px;
    margin: 60px auto;
    padding: 20px;
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
}

.buttons {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

button {
    flex: 1 1 45%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    background: #3f51b5;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.clear-btn {
    background: #e53935;
}
</style>

</head>

<body>

<div class="container">
    <h2>Calculator</h2>

    <input type="text" id="num1" placeholder="Enter First Number">
    <input type="text" id="num2" placeholder="Enter Second Number">

    <div class="buttons">
        <button onclick="calculate('add')">Add</button>
        <button onclick="calculate('sub')">Subtract</button>
        <button onclick="calculate('mul')">Multiply</button>
        <button onclick="calculate('div')">Divide</button>
        <button class="clear-btn" onclick="clearFields()">Clear</button>
    </div>

    <input type="text" id="result" placeholder="Result" readonly>
</div>

<script>
function showError() {
    alert("Please enter valid numbers");
}

function calculate(operation) {
    let n1 = document.getElementById("num1").value;
    let n2 = document.getElementById("num2").value;

    if (n1 === "" || n2 === "") {
        showError();
        return;
    }

    n1 = parseFloat(n1);
    n2 = parseFloat(n2);

    if (isNaN(n1) || isNaN(n2)) {
        showError();
        return;
    }

    let result = 0;

    switch(operation) {
        case 'add':
            result = n1 + n2;
            break;
        case 'sub':
            result = n1 - n2;
            break;
        case 'mul':
            result = n1 * n2;
            break;
        case 'div':
            if (n2 === 0) {
                showError();
                return;
            }
            result = n1 / n2;
            break;
    }

    document.getElementById("result").value = result;
}

function clearFields() {
    document.getElementById("num1").value = "";
    document.getElementById("num2").value = "";
    document.getElementById("result").value = "";
}
</script>

</body>
</html>
